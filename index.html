<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liren Labs · Instagram Grid Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ============ ROOT ============ */
  :root {
    --ig-bg: #000000;
    --ig-fg: #ffffff;
    --ig-muted: #a8a8a8;
    --ig-border: #262626;
    --ig-blue: #0095f6;
    --ig-blue-hover: #1877f2;
    --ig-panel: #121212;
    --ig-panel-2: #1a1a1a;
    --ig-verified: #3897f0;
    --ig-red: #ed4956;

    --canvas: #FAF9F5;
    --ink: #141413;
    --muted-liren: #6B6B66;
    --hairline: #E5E3DC;
    --liren-blue: #0047FF;
    --peter-brown: #3a302c;
    --peter-cream: #F2EFE8;
  }

  html, body {
    background: var(--ig-bg);
    color: var(--ig-fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.45;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }

  /* ============ PAGE SHELL ============ */
  .wrap {
    max-width: 975px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  /* ============ PROFILE HEADER (mobile-first) ============ */
  .profile {
    padding: 12px 16px 16px;
    border-bottom: 1px solid var(--ig-border);
  }
  .profile-head {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
  }
  .profile-username-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    margin: 0;
    flex-shrink: 0;
    background: #000;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .avatar:hover { transform: scale(1.02); }
  .avatar img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 3;
  }
  .avatar-edit {
    position: absolute;
    bottom: 4px; right: 4px;
    width: 36px; height: 36px;
    background: var(--ig-blue);
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: #fff;
    z-index: 5;
    border: 3px solid #000;
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .avatar:hover .avatar-edit { opacity: 1; }
  .avatar-edit svg { width: 16px; height: 16px; }

  .username {
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.01em;
    background: transparent;
    border: 1px solid transparent;
    color: #fff;
    padding: 3px 6px;
    border-radius: 6px;
    min-width: 0;
    flex: 1;
  }
  .username:focus { outline: none; background: #1a1a1a; border-color: #333; }

  .verified {
    display: inline-block;
    width: 18px; height: 18px;
    background: var(--ig-verified);
    clip-path: polygon(50% 0, 61% 10%, 75% 7%, 82% 20%, 95% 24%, 93% 39%, 100% 50%, 93% 61%, 95% 76%, 82% 80%, 75% 93%, 61% 90%, 50% 100%, 39% 90%, 25% 93%, 18% 80%, 5% 76%, 7% 61%, 0 50%, 7% 39%, 5% 24%, 18% 20%, 25% 7%, 39% 10%);
  }
  .dots { color: var(--ig-fg); font-size: 20px; letter-spacing: 2px; margin-left: 6px; cursor: pointer; user-select: none; }

  /* ============ ACTION SHEET (profile ⋯ menu) ============ */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 90;
    display: none;
  }
  .sheet-backdrop.open { display: block; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: #1c1c1c;
    border-radius: 16px 16px 0 0;
    padding: 12px 0 max(12px, env(safe-area-inset-bottom));
    animation: sheetUp 0.18s ease-out;
    max-width: 540px;
    margin: 0 auto;
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .sheet-handle {
    width: 36px; height: 4px;
    background: #444;
    border-radius: 2px;
    margin: 0 auto 10px;
  }
  .sheet-item {
    display: block;
    width: 100%;
    padding: 16px 20px;
    background: transparent;
    border: none;
    border-top: 1px solid #2a2a2a;
    color: #fff;
    font-size: 15px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
  }
  .sheet-item:first-of-type { border-top: none; }
  .sheet-item:hover { background: #232323; }
  .sheet-item.danger { color: var(--ig-red); }
  .sheet-item.cancel {
    color: var(--ig-muted);
    font-weight: 600;
    text-align: center;
    border-top: 8px solid #000;
  }

  .profile-stats {
    display: flex;
    justify-content: space-around;
    padding: 8px 0 14px;
    margin: 0 -4px 0;
    font-size: 13px;
  }
  .profile-stats > div {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    font-size: 13px;
    color: var(--ig-muted);
  }
  .profile-stats > div span { color: var(--ig-muted); }
  .profile-stats b {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .profile-bio-block { margin-bottom: 14px; }
  .profile-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    background: transparent;
    border: 1px solid transparent;
    color: #fff;
    padding: 2px 6px;
    border-radius: 6px;
    display: block;
    width: 100%;
    font-family: inherit;
  }
  .profile-name:focus { outline: none; background: #1a1a1a; border-color: #333; }

  .profile-bio {
    font-size: 14px;
    line-height: 1.5;
    color: var(--ig-fg);
    background: transparent;
    border: 1px solid transparent;
    padding: 4px 6px;
    border-radius: 6px;
    resize: none;
    width: 100%;
    min-height: 60px;
    height: auto;
    font-family: inherit;
  }
  .profile-bio:focus { outline: none; background: #1a1a1a; border-color: #333; }

  .profile-cta {
    display: flex;
    gap: 6px;
  }
  .profile-cta .btn { flex: 1; padding: 8px; font-size: 14px; }
  .profile-cta .btn-icon { flex: 0 0 40px; width: 40px; }

  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    border: none;
    cursor: pointer;
  }
  .btn-primary { background: var(--ig-blue); color: #fff; }
  .btn-ghost { background: #1a1a1a; color: #fff; }
  .btn-icon { background: #1a1a1a; color: #fff; width: 32px; padding: 0; display: grid; place-items: center; font-size: 16px; }

  /* ============ HIGHLIGHTS ============ */
  .highlights {
    display: flex;
    gap: 24px;
    padding: 32px 0 24px;
    overflow-x: auto;
    border-bottom: 1px solid var(--ig-border);
  }
  .highlights::-webkit-scrollbar { display: none; }
  .highlight {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    min-width: 84px;
  }
  .highlight .circle {
    width: 77px; height: 77px;
    border-radius: 50%;
    background: #1a1a1a;
    border: 1px solid #333;
    display: grid;
    place-items: center;
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    color: var(--canvas);
  }
  .highlight .circle.zh { font-family: 'Noto Serif SC', serif; font-size: 26px; }
  .highlight .circle.chrome { background: linear-gradient(140deg, #d0d4de 0%, #8fa5c7 50%, #e8dfd2 100%); }
  .highlight .label {
    font-size: 12px;
    color: var(--ig-fg);
    font-weight: 400;
  }

  /* ============ TABS ============ */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 60px;
    border-bottom: 1px solid var(--ig-border);
    margin-bottom: 3px;
  }
  .tab {
    padding: 14px 0;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--ig-muted);
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-top: 1px solid transparent;
    margin-top: -1px;
    cursor: pointer;
    user-select: none;
  }
  .tab.active { color: var(--ig-fg); border-top-color: var(--ig-fg); }
  .tab svg { width: 12px; height: 12px; }

  /* ============ GRID ============ */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-top: 2px;
  }

  .tile {
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
  }
  .tile.dragging { opacity: 0.25; }
  .tile.drop-target::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 3px solid var(--ig-blue);
    z-index: 10;
    pointer-events: none;
  }
  .drag-ghost {
    position: fixed !important;
    z-index: 200;
    pointer-events: none;
    transform: rotate(2deg) scale(1.05);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    opacity: 0.92;
  }

  .tile .photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  .tile .corner-icon {
    position: absolute;
    top: 10px; right: 10px;
    z-index: 3;
    color: #fff;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
  }
  .tile .corner-icon svg { width: 18px; height: 18px; fill: currentColor; }

  .tile .lw {
    position: absolute;
    bottom: 10px; right: 10px;
    font-family: 'Noto Serif SC', serif;
    font-size: 11px;
    letter-spacing: 0.02em;
    color: rgba(20,20,19,0.35);
    z-index: 3;
  }
  .tile.dark .lw { color: rgba(250,249,245,0.45); }
  .tile.has-photo .lw { color: rgba(255,255,255,0.85); text-shadow: 0 1px 2px rgba(0,0,0,0.4); }

  .tile .pillar {
    position: absolute;
    top: 6px; left: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.08em;
    padding: 2px 5px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border-radius: 3px;
    text-transform: uppercase;
    z-index: 3;
  }

  /* Hidden-post affordance (state is set in Task 12) */
  .tile.is-hidden {
    opacity: 0.35;
    filter: grayscale(0.7);
  }
  .tile.is-hidden::before {
    content: 'HIDDEN';
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #fff;
    background: rgba(0,0,0,0.5);
    z-index: 5;
    pointer-events: none;
  }

  /* Touch devices: no hover overlay, no drag handle (long-press replaces both) */
  @media (hover: none) {
    .tile-hover { display: none; }
    .tile-drag { display: none !important; }
  }

  /* Hover overlay on tiles */
  .tile-hover {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    color: #fff;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 4;
    font-weight: 600;
    font-size: 15px;
  }
  .tile:hover .tile-hover { opacity: 1; }
  .tile-hover .stat { display: inline-flex; align-items: center; gap: 6px; }
  .tile-hover svg { width: 18px; height: 18px; fill: #fff; }

  /* Drag handle */
  .tile-drag {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: #fff;
    width: 28px; height: 22px;
    border-radius: 4px;
    display: none;
    place-items: center;
    z-index: 5;
    cursor: grab;
    font-size: 10px;
    letter-spacing: 2px;
  }
  .tile:hover .tile-drag { display: grid; }
  .tile-drag:active { cursor: grabbing; }

  /* Base tile content container */
  .tile .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 28px 26px;
    z-index: 2;
  }

  .tile .serif {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    line-height: 1.15;
    letter-spacing: -0.005em;
  }
  .tile .sans { font-family: 'Inter', sans-serif; font-weight: 500; line-height: 1.3; }
  .tile .mono { font-family: 'JetBrains Mono', monospace; }
  .tile .zh { font-family: 'Noto Serif SC', serif; }

  .bg-canvas {
    background-color: var(--canvas);
    background-image:
      linear-gradient(rgba(20,20,19,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(20,20,19,0.04) 1px, transparent 1px);
    background-size: 22px 22px;
    color: var(--ink);
  }
  .bg-canvas-plain { background: var(--canvas); color: var(--ink); }
  .bg-ink { background: var(--ink); color: var(--canvas); }
  .bg-brown { background: var(--peter-brown); color: var(--peter-cream); }
  .bg-cream {
    background: var(--peter-cream);
    color: var(--ink);
    background-image:
      linear-gradient(rgba(20,20,19,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(20,20,19,0.04) 1px, transparent 1px);
    background-size: 22px 22px;
  }
  .bg-chrome {
    background:
      radial-gradient(ellipse at 30% 20%, #eef0f5 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, #c7d1e0 0%, transparent 50%),
      linear-gradient(135deg, #dbe0ea 0%, #a8b4c8 50%, #e8dfd2 100%);
    color: var(--ink);
  }
  .bg-slate { background: linear-gradient(155deg, #1a1d24 0%, #2b2f3a 50%, #4a5568 100%); color: #fff; }
  .bg-ink-split { background: var(--ink); color: var(--canvas); }

  .chrome-pin {
    width: 48%;
    aspect-ratio: 0.75;
    margin: 0 auto;
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    background: radial-gradient(ellipse at 35% 25%, #ffffff 0%, #e4eaf5 20%, #8fa5c7 55%, #4a5a7a 100%);
    position: relative;
    box-shadow:
      inset -6px -6px 18px rgba(20,30,60,0.4),
      inset 6px 6px 18px rgba(255,255,255,0.5),
      0 8px 24px rgba(0,0,0,0.15);
    transform: rotate(-8deg);
  }
  .chrome-pin::after {
    content: '';
    position: absolute;
    top: 12%; left: 30%;
    width: 24%; height: 30%;
    border-radius: 50%;
    background: rgba(255,255,255,0.55);
    filter: blur(4px);
  }

  .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 18px; } .mb-3 { margin-bottom: 12px; }
  .size-xl { font-size: 32px; } .size-lg { font-size: 26px; } .size-md { font-size: 20px; }
  .size-sm { font-size: 14px; } .size-xs { font-size: 12px; }
  .size-num { font-size: 58px; font-family: 'Instrument Serif', serif; line-height: 1; }
  .muted { opacity: 0.6; } .italic { font-style: italic; }
  .stack > * + * { margin-top: 10px; }

  .split { display: grid; grid-template-rows: 1fr 1fr; height: 100%; gap: 0; }
  .split > div { display: flex; align-items: center; justify-content: center; padding: 24px; }

  /* ============ ADD-TILE (+ card) ============ */
  .tile.add-tile {
    background: #0b0b0b;
    border: 1px dashed #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    color: #666;
    transition: all 0.2s;
  }
  .tile.add-tile:hover { border-color: var(--ig-blue); color: var(--ig-blue); background: #0b1420; }
  .tile.add-tile .plus { font-size: 42px; font-weight: 200; line-height: 1; }
  .tile.add-tile .lbl { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }

  /* ============ MODAL ============ */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: #000;
    border-radius: 12px;
    max-width: 1200px;
    width: 100%;
    max-height: 92vh;
    display: grid;
    grid-template-columns: minmax(400px, 1fr) 420px;
    overflow: hidden;
    animation: modalIn 0.18s ease-out;
  }
  @keyframes modalIn {
    from { transform: scale(0.96); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* Post preview side */
  .mp {
    background: #000;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 500px;
  }
  .mp-canvas {
    width: 100%;
    aspect-ratio: 1 / 1;
    position: relative;
    background: #0a0a0a;
    overflow: hidden;
  }
  .mp-canvas .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .mp-canvas .slide.active { opacity: 1; }
  .mp-canvas .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* Reuse tile rendering inside slide */
  .slide > .tile-render {
    position: absolute;
    inset: 0;
  }

  .mp-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 30px; height: 30px;
    background: rgba(255,255,255,0.9);
    color: #000;
    border-radius: 50%;
    display: grid;
    place-items: center;
    cursor: pointer;
    z-index: 4;
    border: none;
    font-size: 16px;
    font-weight: 700;
  }
  .mp-nav.prev { left: 10px; }
  .mp-nav.next { right: 10px; }
  .mp-nav:disabled { opacity: 0; pointer-events: none; }

  .mp-dots {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    z-index: 4;
  }
  .mp-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.55);
    transition: background 0.15s;
  }
  .mp-dots span.active { background: #0095f6; }

  .mp-count {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    padding: 3px 9px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    border-radius: 999px;
    z-index: 4;
  }

  /* Editor side */
  .me {
    background: #0a0a0a;
    border-left: 1px solid var(--ig-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .me-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--ig-border);
    flex-shrink: 0;
  }
  .me-title {
    font-size: 14px;
    font-weight: 600;
  }
  .me-close {
    background: transparent;
    border: none;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 4px 8px;
  }
  .me-close:hover { color: var(--ig-muted); }

  .me-user {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--ig-border);
    flex-shrink: 0;
  }
  .me-user .mini-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--ink);
    overflow: hidden;
    position: relative;
  }
  .me-user .mini-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .me-user .un { font-size: 13px; font-weight: 600; }
  .me-user .sub { font-size: 11px; color: var(--ig-muted); }

  .me-body {
    padding: 14px 18px 18px;
    overflow-y: auto;
    flex: 1;
  }
  .me-body::-webkit-scrollbar { width: 8px; }
  .me-body::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ig-muted);
    margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .field input[type="text"],
  .field textarea,
  .field select {
    width: 100%;
    background: #111;
    border: 1px solid #222;
    color: #fff;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;

function defaultState() {
  return {
    profile: {
      username: 'liren.labs',
      name: 'Liren Labs · 立人',
      bio: 'AI agents yang bantu kamu berdiri lebih tinggi.\nJakarta · Hangzhou · Bahasa-first.\n🔗 lirenlabs.ai',
      avatar: null,
    },
    posts: SEED_POSTS_META.map((m, i) => ({
      id: uid(),
      type: m.type,
      pillar: m.pillar,
      caption: m.caption,
      idea: m.idea || '',
      script: m.script || '',
      why: m.why || '',
      hidden: false,
      slides: [{ kind: 'design', templateIdx: i }],
    })),
  };
}

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.profile && Array.isArray(parsed.posts)) {
        // Defensive: ensure v2 fields exist even on partial/older v2 payloads
        parsed.posts = parsed.posts.map(p => ({
          idea: '', script: '', why: '', hidden: false, ...p
        }));
        return parsed;
      }
    }
    // Migrate from v1
    const v1 = localStorage.getItem('liren.grid.planner.v1');
    if (v1) {
      const parsed = JSON.parse(v1);
      if (parsed.profile && Array.isArray(parsed.posts)) {
        parsed.posts = parsed.posts.map(p => ({
          idea: '', script: '', why: '', hidden: false, ...p
        }));
        // Persist migrated state under the v2 key; keep v1 for recovery
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed)); } catch {}
        return parsed;
      }
    }
  } catch {}
  return defaultState();
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    toast('Could not save — storage full. Try fewer images or smaller files.');
  }
}

function cornerIconSvg(type) {
  if (type === 'reel')     return `<svg viewBox="0 0 24 24"><path d="M4 3v18l16-9L4 3z"/></svg>`;
  if (type === 'carousel') return `<svg viewBox="0 0 24 24"><rect x="6" y="6" width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><rect x="3" y="3" width="14" height="14" rx="2" fill="currentColor" opacity="0.9"/></svg>`;
  return '';
}

// Render a single slide's visual (either a photo or a design template)
function renderSlideInner(slide) {
  if (slide.kind === 'photo') {
    return `<img class="photo" src="${escapeAttr(slide.src)}" alt="" />`;
  }
  const tpl = DESIGN_TEMPLATES[slide.templateIdx] || DESIGN_TEMPLATES[0];
  // Note: design markup must not include outer .tile — caller supplies the tile wrapper
  return tpl.html;
}

// Return the bg class a slide should give to its wrapper
function slideBgClass(slide) {
  if (slide.kind === 'photo') return 'has-photo dark';
  const tpl = DESIGN_TEMPLATES[slide.templateIdx] || DESIGN_TEMPLATES[0];
  return tpl.bg;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  state.posts.forEach((post, idx) => {
    const firstSlide = post.slides[0] || { kind: 'design', templateIdx: 0 };
    const bgClass = slideBgClass(firstSlide);
    const tile = document.createElement('div');
    tile.className = `tile ${bgClass}`;
    tile.dataset.postId = post.id;
    tile.dataset.index = idx;
    tile.style.touchAction = 'pan-y';

    tile.innerHTML = `
      ${post.pillar ? `<span class="pillar">${escapeHtml(post.pillar)} · ${escapeHtml(post.type)}</span>` : ''}
      ${post.type !== 'still' ? `<div class="corner-icon">${cornerIconSvg(post.type)}</div>` : ''}
      ${renderSlideInner(firstSlide)}
      <span class="lw">立人</span>
      <div class="tile-drag" title="Drag to reorder">⋮⋮</div>
      <div class="tile-hover">
        <span class="stat"><svg viewBox="0 0 24 24"><path d="M12 21s-8-5-8-12a5 5 0 019-3 5 5 0 019 3c0 7-8 12-8 12z"/></svg> ${Math.floor(Math.random()*800)+40}</span>
        <span class="stat"><svg viewBox="0 0 24 24"><path d="M21 15a4 4 0 01-4 4H7l-4 4V5a4 4 0 014-4h10a4 4 0 014 4z"/></svg> ${Math.floor(Math.random()*60)+5}</span>
      </div>
    `;

    tile.addEventListener('click', (e) => {
      if (dragHappened) { dragHappened = false; return; }
      if (e.target.closest('.tile-drag')) return;
      openModal(post.id);
    });

    // Long-press drag-reorder (replaces HTML5 drag-and-drop)
    tile.addEventListener('pointerdown', onTilePointerDown);
    tile.addEventListener('pointermove', onTilePointerMove);
    tile.addEventListener('pointerup', onTilePointerUp);
    tile.addEventListener('pointercancel', onTilePointerUp);

    grid.appendChild(tile);
  });

  // Add-tile button
  const addTile = document.createElement('div');
  addTile.className = 'tile add-tile';
  addTile.innerHTML = `<div class="plus">+</div><div class="lbl">New Post</div>`;
  addTile.addEventListener('click', addNewPost);
  grid.appendChild(addTile);
}

/* ================================================================
   LONG-PRESS DRAG-REORDER (pointer-based, works on touch + mouse)
================================================================ */
const LONGPRESS_MS = 380;
const MOVE_CANCEL_PX = 6;
let lpTimer = null;
let lpStart = null;
let dragTile = null;
let dragPostId = null;
let dragGhost = null;
let dragHappened = false;

function onTilePointerDown(e) {
  const tile = e.currentTarget;
  if (!tile.dataset.postId) return;
  // Only primary button for mouse (ignore right-click etc.)
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  // Reset drag-consumed flag at the start of a fresh gesture.
  dragHappened = false;
  lpStart = { x: e.clientX, y: e.clientY, tile, pointerId: e.pointerId };
  clearTimeout(lpTimer);
  lpTimer = setTimeout(() => {
    if (lpStart) startDrag(lpStart, tile);
  }, LONGPRESS_MS);
}

function onTilePointerMove(e) {
  if (!lpStart || dragTile) return;
  const dx = Math.abs(e.clientX - lpStart.x);
  const dy = Math.abs(e.clientY - lpStart.y);
  if (dx > MOVE_CANCEL_PX || dy > MOVE_CANCEL_PX) {
    // User is scrolling — cancel the long-press timer so drag doesn't activate.
    clearTimeout(lpTimer);
    lpTimer = null;
    lpStart = null;
  }
}

function onTilePointerUp() {
  clearTimeout(lpTimer);
  lpTimer = null;
  lpStart = null;
  if (dragTile) endDrag();
}

function startDrag(start, tile) {
  dragTile = tile;
  dragPostId = tile.dataset.postId;
  dragHappened = true;
  tile.classList.add('dragging');
  navigator.vibrate?.(10);

  const rect = tile.getBoundingClientRect();
  dragGhost = tile.cloneNode(true);
  dragGhost.classList.add('drag-ghost');
  dragGhost.style.width = rect.width + 'px';
  dragGhost.style.height = rect.height + 'px';
  dragGhost.style.left = rect.left + 'px';
  dragGhost.style.top = rect.top + 'px';
  dragGhost.style.pointerEvents = 'none';
  document.body.appendChild(dragGhost);

  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEndDoc);
  document.addEventListener('pointercancel', onDragEndDoc);
}

function onDragMove(e) {
  if (!dragGhost || !dragTile) return;
  const rect = dragTile.getBoundingClientRect();
  dragGhost.style.left = (e.clientX - rect.width / 2) + 'px';
  dragGhost.style.top = (e.clientY - rect.height / 2) + 'px';

  // Ghost must not intercept hit-testing
  const prevPE = dragGhost.style.pointerEvents;
  dragGhost.style.pointerEvents = 'none';
  const el = document.elementFromPoint(e.clientX, e.clientY);
  dragGhost.style.pointerEvents = prevPE;

  const target = el?.closest?.('.tile');
  document.querySelectorAll('.drop-target').forEach(t => t.classList.remove('drop-target'));
  if (target && target !== dragTile && target.dataset.postId) {
    target.classList.add('drop-target');
  }
}

function onDragEndDoc() {
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEndDoc);
  document.removeEventListener('pointercancel', onDragEndDoc);
  const target = document.querySelector('.drop-target');
  if (target && target.dataset.postId && target.dataset.postId !== dragPostId) {
    const fromIdx = state.posts.findIndex(p => p.id === dragPostId);
    const toIdx = state.posts.findIndex(p => p.id === target.dataset.postId);
    if (fromIdx >= 0 && toIdx >= 0) {
      const [moved] = state.posts.splice(fromIdx, 1);
      state.posts.splice(toIdx, 0, moved);
      saveState();
      renderGrid();
    }
  }
  endDrag();
}

function endDrag() {
  if (dragTile) dragTile.classList.remove('dragging');
  if (dragGhost) dragGhost.remove();
  document.querySelectorAll('.drop-target').forEach(t => t.classList.remove('drop-target'));
  dragTile = null;
  dragPostId = null;
  dragGhost = null;
  // dragHappened stays true until the next tile click (which consumes + resets it)
  // or until the next pointerdown starts a fresh gesture.
}

/* ================================================================
   MODAL
================================================================ */
let openPostId = null;
let currentSlideIdx = 0;

function openModal(postId) {
  openPostId = postId;
  currentSlideIdx = 0;
  renderModal();
  document.getElementById('modalBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  openPostId = null;
  document.getElementById('modalBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}

function currentPost() { return state.posts.find(p => p.id === openPostId); }

function renderModal() {
  const post = currentPost();
  if (!post) return;

  // Preview
  const mp = document.getElementById('modalPreview');
  mp.innerHTML = '';
  const canvas = document.createElement('div');
  canvas.className = 'mp-canvas';

  post.slides.forEach((slide, i) => {
    const s = document.createElement('div');
    s.className = 'slide' + (i === currentSlideIdx ? ' active' : '');
    const bgClass = slideBgClass(slide);
    const wrap = document.createElement('div');
    wrap.className = `tile-render tile ${bgClass}`;
    wrap.style.position = 'absolute';
    wrap.style.inset = '0';
    wrap.style.cursor = 'default';
    wrap.innerHTML = `
      ${post.pillar ? `<span class="pillar">${escapeHtml(post.pillar)}</span>` : ''}
      ${post.type === 'reel' && i === 0 ? `<div class="corner-icon">${cornerIconSvg('reel')}</div>` : ''}
      ${renderSlideInner(slide)}
      <span class="lw">立人</span>
    `;
    s.appendChild(wrap);
    canvas.appendChild(s);
  });

  // Nav arrows for carousel
  if (post.slides.length > 1) {
    const prev = document.createElement('button');
    prev.className = 'mp-nav prev';
    prev.innerHTML = '‹';
    prev.disabled = currentSlideIdx === 0;
    prev.addEventListener('click', () => { if (currentSlideIdx > 0) { currentSlideIdx--; renderModal(); } });
    const next = document.createElement('button');
    next.className = 'mp-nav next';
    next.innerHTML = '›';
    next.disabled = currentSlideIdx >= post.slides.length - 1;
    next.addEventListener('click', () => { if (currentSlideIdx < post.slides.length - 1) { currentSlideIdx++; renderModal(); } });
    canvas.appendChild(prev);
    canvas.appendChild(next);

    const dots = document.createElement('div');
    dots.className = 'mp-dots';
    post.slides.forEach((_, i) => {
      const d = document.createElement('span');
      if (i === currentSlideIdx) d.classList.add('active');
      dots.appendChild(d);
    });
    canvas.appendChild(dots);

    const count = document.createElement('div');
    count.className = 'mp-count';
    count.textContent = `${currentSlideIdx + 1} / ${post.slides.length}`;
    canvas.appendChild(count);
  }

  mp.appendChild(canvas);

  // Editor form
  document.querySelectorAll('.type-row .tb').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === post.type);
  });
  document.getElementById('pillarSelect').value = post.pillar || 'HOT-TAKE';
  document.getElementById('captionInput').value = post.caption || '';

  renderSlidesList();
}

function renderSlidesList() {
  const post = currentPost();
  const list = document.getElementById('slidesList');
  list.innerHTML = '';
  post.slides.forEach((slide, i) => {
    const item = document.createElement('div');
    item.className = 'slide-item';
    const thumb = slide.kind === 'photo'
      ? `<div class="thumb"><img src="${escapeAttr(slide.src)}" alt=""/></div>`
      : `<div class="thumb design">A</div>`;
    const label = slide.kind === 'photo' ? 'Photo' : 'Design template';
    item.innerHTML = `
      ${thumb}
      <div class="meta">
        <b>Slide ${i + 1}</b>
        ${label}${slide.kind === 'photo' && slide.filename ? ' · ' + escapeHtml(slide.filename) : ''}
      </div>
      <div class="actions">
        ${i > 0 ? `<button class="mv" data-dir="-1" data-i="${i}" title="Move up">↑</button>` : ''}
        ${i < post.slides.length - 1 ? `<button class="mv" data-dir="1" data-i="${i}" title="Move down">↓</button>` : ''}
        <button class="rm" data-i="${i}" title="Remove">✕</button>
      </div>
    `;
    list.appendChild(item);
  });
  list.querySelectorAll('.rm').forEach(b => b.addEventListener('click', (e) => {
    const i = +e.currentTarget.dataset.i;
    const p = currentPost();
    if (p.slides.length === 1) {
      toast('A post needs at least one slide.');
      return;
    }
    p.slides.splice(i, 1);
    if (currentSlideIdx >= p.slides.length) currentSlideIdx = p.slides.length - 1;
    // auto-adjust type if slide count drops to 1
    if (p.slides.length === 1 && p.type === 'carousel') p.type = 'still';
    saveState();
    renderModal();
    renderGrid();
  }));
  list.querySelectorAll('.mv').forEach(b => b.addEventListener('click', (e) => {
    const i = +e.currentTarget.dataset.i;
    const dir = +e.currentTarget.dataset.dir;
    const p = currentPost();
    const j = i + dir;
    if (j < 0 || j >= p.slides.length) return;
    [p.slides[i], p.slides[j]] = [p.slides[j], p.slides[i]];
    if (currentSlideIdx === i) currentSlideIdx = j;
    else if (currentSlideIdx === j) currentSlideIdx = i;
    saveState();
    renderModal();
    renderGrid();
  }));
}

/* ================================================================
   EDITING HANDLERS
================================================================ */
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalBackdrop').addEventListener('click', (e) => {
  if (e.target.id === 'modalBackdrop') closeModal();
});
document.addEventListener('keydown', (e) => {
  if (!openPostId) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') {
    if (currentSlideIdx > 0) { currentSlideIdx--; renderModal(); }
  }
  if (e.key === 'ArrowRight') {
    const p = currentPost();
    if (p && currentSlideIdx < p.slides.length - 1) { currentSlideIdx++; renderModal(); }
  }
});

document.querySelectorAll('.type-row .tb').forEach(btn => {
  btn.addEventListener('click', () => {
    const post = currentPost();
    if (!post) return;
    post.type = btn.dataset.type;
    saveState();
    renderModal();
    renderGrid();
  });
});

document.getElementById('pillarSelect').addEventListener('change', (e) => {
  const post = currentPost(); if (!post) return;
  post.pillar = e.target.value;
  saveState();
  renderModal();
  renderGrid();
});
document.getElementById('captionInput').addEventListener('input', (e) => {
  const post = currentPost(); if (!post) return;
  post.caption = e.target.value;
  saveState();
});

/* ---- Upload photo(s) ---- */
const filePicker = document.getElementById('filePicker');
document.getElementById('addPhotoBtn').addEventListener('click', () => filePicker.click());
filePicker.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  const post = currentPost(); if (!post) return;
  for (const file of files) {
    const dataUrl = await readAsDataURL(file);
    post.slides.push({ kind: 'photo', src: dataUrl, filename: file.name });
  }
  if (post.slides.length > 1) {
    // If only 1 slide was design and we added a photo, promote to carousel unless user picks still
    if (post.type === 'still') post.type = 'carousel';
  }
  currentSlideIdx = post.slides.length - 1;
  filePicker.value = '';
  saveState();
  renderModal();
  renderGrid();
});

/* ---- Add photo from URL ---- */
document.getElementById('addUrlBtn').addEventListener('click', () => {
  const url = prompt('Image URL:');
  if (!url) return;
  const post = currentPost(); if (!post) return;
  post.slides.push({ kind: 'photo', src: url.trim(), filename: 'url' });
  if (post.slides.length > 1 && post.type === 'still') post.type = 'carousel';
  currentSlideIdx = post.slides.length - 1;
  saveState();
  renderModal();
  renderGrid();
});

document.getElementById('deletePostBtn').addEventListener('click', () => {
  const post = currentPost(); if (!post) return;
  if (!confirm('Delete this post? This cannot be undone.')) return;
  state.posts = state.posts.filter(p => p.id !== post.id);
  saveState();
  closeModal();
  renderProfile();
  renderGrid();
});

document.getElementById('doneBtn').addEventListener('click', closeModal);

/* ================================================================
   PROFILE EDITING
================================================================ */
const avatarPicker = document.getElementById('avatarPicker');
document.getElementById('avatar').addEventListener('click', () => avatarPicker.click());
avatarPicker.addEventListener('change', async (e) => {
  const f = e.target.files?.[0]; if (!f) return;
  state.profile.avatar = await readAsDataURL(f);
  avatarPicker.value = '';
  saveState();
  renderProfile();
});

document.getElementById('username').addEventListener('input', (e) => {
  state.profile.username = e.target.value || 'username';
  saveState();
  // update mini avatar label without redrawing avatar image
  document.getElementById('miniUsername').textContent = state.profile.username;
});
document.getElementById('profileName').addEventListener('input', (e) => {
  state.profile.name = e.target.value;
  saveState();
});
document.getElementById('profileBio').addEventListener('input', (e) => {
  state.profile.bio = e.target.value;
  saveState();
});

/* ================================================================
   ADMIN ACTIONS
   Top-nav buttons are gone (see Task 5 — chrome stripped). Task 6 will
   re-wire these through the profile ⋯ action sheet. Functions are
   hoisted / named so they remain reachable for that task.
================================================================ */
function doReset() {
  if (!confirm('Reset everything back to the default mockup? Your edits will be lost.')) return;
  state = defaultState();
  saveState();
  renderProfile();
  renderGrid();
  toast('Reset to default.');
}

function doExport() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `liren-grid-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported JSON.');
}

const jsonPicker = document.getElementById('jsonPicker');
function doImport() { jsonPicker.click(); }

jsonPicker.addEventListener('change', async (e) => {
  const f = e.target.files?.[0]; if (!f) return;
  try {
    const txt = await f.text();
    const parsed = JSON.parse(txt);
    if (!parsed.profile || !Array.isArray(parsed.posts)) throw new Error('bad schema');
    state = parsed;
    saveState();
    renderProfile();
    renderGrid();
    toast('Imported.');
  } catch (err) {
    toast('Could not import — invalid JSON.');
  }
  jsonPicker.value = '';
});

function addNewPost() {
  const post = {
    id: uid(),
    type: 'still',
    pillar: 'HOT-TAKE',
    caption: '',
    idea: '',
    script: '',
    why: '',
    hidden: false,
    slides: [{ kind: 'design', templateIdx: Math.floor(Math.random() * DESIGN_TEMPLATES.length) }],
  };
  state.posts.push(post);
  saveState();
  renderProfile();
  renderGrid();
  openModal(post.id);
}

// Stub — implemented in Task 12 (hidden posts view).
function openHiddenView() { /* implemented in Task 12 */ }

/* ================================================================
   ACTION SHEET (profile ⋯ menu)
================================================================ */
const sheetBackdrop = document.getElementById('sheetBackdrop');
function openSheet() { sheetBackdrop.classList.add('open'); }
function closeSheet() { sheetBackdrop.classList.remove('open'); }

document.getElementById('profileDots').addEventListener('click', openSheet);
document.getElementById('profileDots').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openSheet(); }
});
sheetBackdrop.addEventListener('click', (e) => {
  if (e.target === sheetBackdrop) closeSheet();
});
document.querySelectorAll('.sheet-item').forEach(btn => {
  btn.addEventListener('click', () => {
    const action = btn.dataset.action;
    closeSheet();
    if (action === 'new') addNewPost();
    else if (action === 'hidden') openHiddenView();
    else if (action === 'export') doExport();
    else if (action === 'import') jsonPicker.click();
    else if (action === 'reset') doReset();
  });
});

/* ================================================================
   UTIL
================================================================ */
function readAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return escapeHtml(s); }

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ================================================================
   INIT
================================================================ */
renderProfile();
renderGrid();
</script>
</body>
